version: '3.9'

services:
  supermemory:
    build:
      context: .
      dockerfile: Dockerfile.supermemory
    container_name: machinememory-supermemory
    ports:
      - "6767:6767"
    volumes:
      # Persists all memories locally on your machine
      - supermemory_data:/app/.supermemory
    environment:
      PORT: 6767
      SUPERMEMORY_DATA_DIR: /app/.supermemory
      # ─── LLM for memory extraction via Groq (OpenAI-compatible mode) ─────────────
      # Supermemory's memory agent uses the OpenAI-compatible endpoint path.
      # GROQ_API_KEY is loaded from the root .env file by docker-compose.
      OPENAI_API_KEY: ${GROQ_API_KEY}
      OPENAI_BASE_URL: https://api.groq.com/openai/v1
      OPENAI_MODEL: llama-3.1-8b-instant
      # ─── Embeddings: local Xenova model, no additional API key needed ─────────────
      SUPERMEMORY_EMBEDDING_PROVIDER: local
      # ─── Disable telemetry ───────────────────────────────────────────────────────
      SUPERMEMORY_DISABLE_TELEMETRY: 1
    restart: unless-stopped

volumes:
  supermemory_data:
    driver: local
